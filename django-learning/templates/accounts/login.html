{% extends 'base.html' %}

{% block title %}Login | SPP{% endblock %}

{% block content %}
<div class="row justify-content-center w-100">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex p-3 rounded-circle mb-3" style="background: rgba(99, 102, 241, 0.15);">
                    <i class="fa-solid fa-lock text-primary fs-3"></i>
                </div>
                <h3 class="fw-bold text-white mb-1">Welcome Back</h3>
                <p class="text-muted">Sign in to your advisor portal</p>
            </div>
            
            <form method="POST" autocomplete="off">
                {% csrf_token %}
                
                {% if form.errors %}
                    <div class="alert alert-danger py-2" role="alert" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; font-size: 0.85rem;">
                        Invalid username or password. Please try again.
                    </div>
                {% endif %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label text-muted fw-semibold" style="font-size: 0.8rem;">Username</label>
                    <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control" placeholder="Username">
                </div>
                <div class="mb-4">
                    <label for="id_password" class="form-label text-muted fw-semibold" style="font-size: 0.8rem;">Password</label>
                    <input type="password" name="password" required id="id_password" class="form-control" placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-3">
                    Sign In
                </button>
            </form>
            
            <div class="text-center mt-3">
                <span class="text-muted" style="font-size: 0.85rem;">Don't have an account? </span>
                <a href="{% url 'signup' %}" class="text-white fw-semibold text-decoration-none" style="font-size: 0.85rem; border-bottom: 1px dashed rgba(255,255,255,0.4);">Register</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
